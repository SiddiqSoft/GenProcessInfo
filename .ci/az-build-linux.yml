# ============================================================================
# Azure Pipelines Linux Build Template
# ============================================================================
#
# Purpose: Build the project on Linux with Clang or GCC compiler
# Called by: azure-pipelines.yml (StgBldLinux stage)
# Triggers: When RunLinux parameter is true
#
# This template:
# 1. Builds the project on Linux with Clang or GCC compiler
# 2. Supports Release and Debug build types
# 3. Runs tests (optional)
# 4. Collects code coverage (Debug builds only)
# 5. Publishes build artifacts and test results
# 6. Saves version information for cross-stage sharing
#
# Key Features:
# - No NuGet package creation (Linux-only builds)
# - Saves version to files for cross-stage sharing
# - Supports both Clang and GCC compilers
# - ASAN and code coverage for Debug builds
# - Docker-based Cosmos DB emulator for testing
#
# Requirements:
# - Self-hosted Linux build agents
# - CMake 3.29+, Ninja, Docker
# - Clang 21+ or GCC 16+
#
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
parameters:
  - name: displayName
    type: string
    
  - name: runTests
    type: boolean
    default: true
    
  - name: Cleanup
    type: boolean
    default: false
    
  - name: matrixConfigs
    type: object


# ============================================================================
# JOBS
# ============================================================================
jobs:
  - job: JobLinuxBuild
    displayName: ${{ parameters.displayName }}
    
    workspace:
      clean: all
    
    pool:
      name: Default
      demands:
        - Agent.OS -equals Linux
        - docker
    
    strategy:
      matrix: ${{ parameters.matrixConfigs }}
    
    steps:
      # ====================================================================
      # START COSMOS DB EMULATOR (Docker)
      # We startup early to allow the container to spin up to speed
      # while we're building the project.
      # ====================================================================
      - bash: |
          echo "Starting Azure CosmosDB emulator..."
          chmod +x $(System.DefaultWorkingDirectory)/tests/setup-emulator.sh
          $(System.DefaultWorkingDirectory)/tests/setup-emulator.sh
        displayName: Start Azure CosmosDB Emulator
        condition: and(succeeded(), eq(${{ parameters.runTests }}, true))

      # ====================================================================
      # VERSION DETECTION
      # ====================================================================
      - task: gitversion-setup@4
        displayName: Install GitVersion
        inputs:
          versionSpec: 6.x
          preferLatestVersion: true

      - task: gitversion-execute@4
        displayName: Determine Version
        name: version_step
        inputs:
          useConfigFile: true
          configFilePath: GitVersion.yml
          updateBuildNumber: true

      - bash: |
          echo "$(GITVERSION_MAJORMINORPATCH)" > TagVersion.txt
          echo "$(GITVERSION_FULLSEMVER)" > FullSemVer.txt
          echo "Version: $(GITVERSION_MAJORMINORPATCH)"
          echo "Full SemVer: $(GITVERSION_FULLSEMVER)"
        displayName: Save Version Information

      # ====================================================================
      # BUILD
      # ====================================================================
      - task: CMake@1
        displayName: CMake Configure
        inputs:
          cmakeArgs: "--preset $(cmake.preset) -DCI_BUILDID=$(GITVERSION_MAJORMINORPATCH) -DCPM_SOURCE_CACHE=$(cpmCachePath)"
          workingDirectory: $(System.DefaultWorkingDirectory)

      - task: CMake@1
        displayName: CMake Build
        inputs:
          cmakeArgs: "--build --preset $(cmake.preset) -DCI_BUILDID=$(GITVERSION_MAJORMINORPATCH) -DCPM_SOURCE_CACHE=$(cpmCachePath)"
          workingDirectory: $(System.DefaultWorkingDirectory)
        condition: succeeded()

      - task: PublishBuildArtifacts@1
        displayName: Publish Build Artifacts
        inputs:
          PathtoPublish: $(buildOutputPath)
          ArtifactName: build-$(cmake.preset)
          publishLocation: Container
        condition: succeeded()

      # ====================================================================
      # SET BUILD NUMBER
      # ====================================================================
      - bash: |
          echo "##vso[build.updateBuildNumber]$(GITVERSION_MAJORMINORPATCH)"
        displayName: Set Build Number (Release)
        condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')))

      - bash: |
          echo "##vso[build.updateBuildNumber]$(GITVERSION_SEMVER)"
        displayName: Set Build Number (Pre-release)
        condition: and(succeeded(), ne(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.SourceBranch'], 'refs/heads/master'))

      # ====================================================================
      # TESTING
      # ====================================================================
      - task: CMake@1
        displayName: Run Tests
        inputs:
          cmakeArgs: "-E chdir $(buildOutputPath)/tests ctest --output-junit $(testResultsPath)/$(cmake.preset)_test_detail.xml --output-on-failure"
          workingDirectory: $(System.DefaultWorkingDirectory)
        continueOnError: true
        condition: and(succeeded(), eq(${{ parameters.runTests }}, true))

      - bash: |
          echo "Stopping emulator..."
          docker stop $(emulatorName) || true
        displayName: Stop Azure CosmosDB Emulator
        condition: always()
        continueOnError: true

      # ====================================================================
      # CODE COVERAGE (Debug builds on x64 Linux only)
      # ====================================================================
      - bash: |
          echo "Collecting code coverage..."
          gcovr --delete \
            --root $(System.DefaultWorkingDirectory)/ \
            --print-summary \
            --xml-pretty \
            --xml $(testResultsPath)/coverage.xml \
            $(buildOutputPath) \
            --filter='$(System.DefaultWorkingDirectory)/include/*' \
            --filter='$(System.DefaultWorkingDirectory)/tests/*' \
            --gcov-executable 'llvm-cov gcov'
        displayName: Collect Code Coverage
        workingDirectory: $(buildOutputPath)
        condition: and(succeeded(), eq(variables['BuildType'], 'Debug'), startsWith(variables['Agent.OS'], 'Linux'), eq(variables['Agent.OSArchitecture'], 'X64'))
        continueOnError: true

      # ====================================================================
      # PUBLISH RESULTS
      # ====================================================================
      - task: PublishTestResults@2
        displayName: Publish Test Results
        inputs:
          testResultsFormat: JUnit
          testRunTitle: Tests $(cmake.preset)
          testResultsFiles: $(testResultsPath)/$(cmake.preset)_test_detail.xml
          mergeTestResults: false
          buildConfiguration: $(BuildType)
        continueOnError: true
        condition: and(succeeded(), eq(${{ parameters.runTests }}, true), or(eq(variables['BuildType'], 'Release'), failed()))

      - task: PublishCodeCoverageResults@2
        displayName: Publish Code Coverage Results
        inputs:
          summaryFileLocation: $(testResultsPath)/coverage.*
        condition: and(succeeded(), eq(variables['BuildType'], 'Debug'), startsWith(variables['Agent.OS'], 'Linux'), eq(variables['Agent.OSArchitecture'], 'X64'))
        continueOnError: true
