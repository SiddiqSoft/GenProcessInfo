# ============================================================================
# Azure Pipelines Linux Build Template
# ============================================================================
# This file should contain project-specific pre-test steps for Linux builds.
# It is included in the main Linux build pipeline before running tests.
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
parameters:
  - name: thisArchitecture
    type: string

  - name: runTests
    type: boolean
    
steps:
  # ====================================================================
  # Emulator Setup (for tests)
  # ====================================================================
  - task: BatchScript@1
    displayName: Start Azure CosmosDB Emulator
    inputs:
      filename: $(System.DefaultWorkingDirectory)/tests/setup-linux-emulator.bat
    condition: and(succeeded(), eq(${{ parameters.runTests }}, true), ne('${{parameters.thisArchitecture}}', 'arm64')) # docker on arm64 not available yet    
