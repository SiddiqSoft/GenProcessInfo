# ============================================================================
# Azure Pipelines Linux Build Template
# ============================================================================
# This file should contain project-specific pre-test steps for Linux builds.
# It is included in the main Linux build pipeline before running tests.
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
parameters:
  - name: runTests
    type: boolean
    default: true
    
steps:
  # ====================================================================
  # START COSMOS DB EMULATOR (Docker)
  # We startup early to allow the container to spin up to speed
  # while we're building the project.
  # ====================================================================
  - bash: |
      echo "Starting Azure CosmosDB emulator..."
      chmod +x $(System.DefaultWorkingDirectory)/tests/setup-emulator.sh
      $(System.DefaultWorkingDirectory)/tests/setup-emulator.sh
    displayName: Start Azure CosmosDB Emulator
    condition: and(succeeded(), eq(${{ parameters.runTests }}, true))
