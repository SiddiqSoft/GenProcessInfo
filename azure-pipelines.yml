# ============================================================================
# Azure Pipelines Main Configuration
# ============================================================================
#
# This pipeline:
# 1. Builds the library across multiple platforms with a build matrix
#    - Windows (x64, arm64) with MSVC
#    - Linux (x64) with Clang and GCC
# 2. Runs tests on all platforms (configurable)
# 3. Publishes to NuGet and GitHub (on main/master branches)
#
# Pipeline Stages:
# 1. Windows - Cleanup, build, and test for Windows with matrix for architecture and compiler
# 2. Linux - Cleanup, build, and test for Linux with matrix for architecture and compiler
# 3. Publication - Publishes to NuGet and GitHub
#
# Documentation: See PIPELINE_DOCUMENTATION_INDEX.md for detailed information
# ============================================================================

# ============================================================================
# TRIGGER & PR CONFIGURATION
# ============================================================================
trigger:
  branches:
    include:
      - main
      - master
      - development
      - develop
      - release/*
  paths:
    exclude:
      - README.md
      - .ci/* # Skip CI when changing pipeline files
      - azure-pipelines.yml # Avoids recursive triggers when modifying the pipeline itself
pr:
  branches:
    include:
      - main
      - release/*

# ============================================================================
# RESOURCES
# ============================================================================
resources:
  repositories:
    - repository: self
      type: git

# ============================================================================
# PARAMETERS
# ============================================================================
parameters:
  # Compiler Selection per Platform
  - name: CompilerSelection_Windows
    type: object
    default:
      - MSVC
    displayName: "Windows compilers to build (MSVC)"

  - name: CompilerSelection_Linux
    type: object
    default:
      - Clang
      - GCC
    displayName: "Linux compilers to build (Clang, GCC)"

  # Testing
  - name: RunTests
    type: boolean
    default: true
    displayName: "Run tests after building"

  # Publishing
  - name: PublishNuGet
    type: boolean
    default: false
    displayName: "Publish to NuGet (auto-enabled on main/master)"

  - name: PublishGitHub
    type: boolean
    default: false
    displayName: "Create GitHub release (auto-enabled on main/master)"

  # Cleanup
  - name: Cleanup
    type: boolean
    default: false
    displayName: "Cleanup only (skip builds and tests)"

# ============================================================================
# VARIABLES
# ============================================================================
variables:
  # Auto-enable publishing on main/master branches
  ${{ if and(eq(parameters.PublishNuGet, false), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master'))) }}:
    PublishNuGet: true
    PublishGitHub: true
  ${{ else }}:
    PublishNuGet: ${{ parameters.PublishNuGet }}
    PublishGitHub: ${{ parameters.PublishGitHub }}

  # System information
  AgentOS: $(Agent.OS)
  AgentArch: $(Agent.OSArchitecture)

  # Build paths
  cpmCachePath: $(Agent.HomeDirectory)/.cpmcache
  buildOutputPath: $(System.DefaultWorkingDirectory)/build/$(cmake.preset)
  testResultsPath: $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests/results

# ============================================================================
# STAGES
# ============================================================================
stages:
  # ==========================================================================
  # STAGE 1: WINDOWS BUILD
  # ==========================================================================
  - stage: Windows
    displayName: Windows
    dependsOn: []
    condition: ne(${{ parameters.Cleanup }}, true)
    jobs:
      - template: .ci/az-cleanup-windows.yml
        parameters:
          cleanup: ${{ parameters.Cleanup }}
    
      - job: WindowsBuildMatrix
        displayName: Windows Build and Test
        strategy:
          matrix:
            # Windows x64 Release
            ${{ each compiler in parameters.CompilerSelection_Windows }}:
              Windows_x64_${{ compiler }}_Release:
                architecture: x64
                compiler: ${{ compiler }}
                buildType: Release
                cmakePreset: Windows-x64-Release
              # Windows arm64 Release
              Windows_arm64_${{ compiler }}_Release:
                architecture: arm64
                compiler: ${{ compiler }}
                buildType: Release
                cmakePreset: Windows-arm64-Release
        
        steps:
          # Build step
          - template: .ci/az-build-windows.yml
            parameters:
              displayName: "Windows $(architecture) $(compiler) $(buildType)"
              architecture: $(architecture)
              compiler: $(compiler)
              buildType: $(buildType)
              cmakePreset: $(cmakePreset)
              runTests: false
              publishNuGet: ${{ variables.PublishNuGet }}
              cleanup: ${{ parameters.Cleanup }}

  # ==========================================================================
  # STAGE 2: LINUX BUILD
  # ==========================================================================
  - stage: Linux
    displayName: Linux
    dependsOn: []
    condition: ne(${{ parameters.Cleanup }}, true)
    jobs:
      - job: LinuxBuildMatrix
        displayName: Linux Build and Test
        strategy:
          matrix:
            # Linux x64 with selected compilers
            ${{ each compiler in parameters.CompilerSelection_Linux }}:
              Linux_x64_${{ compiler }}_Release:
                architecture: x64
                compiler: ${{ compiler }}
                buildType: Release
                cmakePreset: Linux-${{ compiler }}-Release
        steps:
          # Cleanup step
          - script: |
              echo "Cleaning up build artifacts..."
              rm -rf "$(buildOutputPath)"
              rm -rf "$(cpmCachePath)"
            displayName: "Cleanup Build Artifacts"
            condition: eq('${{ parameters.Cleanup }}', 'true')

          # Build and test step
          - template: .ci/az-build-linux.yml
            parameters:
              displayName: "Linux $(architecture) $(compiler) $(buildType)"
              architecture: $(architecture)
              compiler: $(compiler)
              buildType: $(buildType)
              cmakePreset: $(cmakePreset)
              runTests: ${{ parameters.RunTests }}
              cleanup: ${{ parameters.Cleanup }}

  # ==========================================================================
  # STAGE 3: PUBLICATION
  # ==========================================================================
  - stage: Publication
    displayName: Publication
    dependsOn:
      - Windows
      - Linux
    condition: and(ne(${{ parameters.Cleanup }}, true), succeeded())
    jobs:
      # NuGet Release
      - template: .ci/az-publish-nuget.yml
        parameters:
          displayName: NuGet Release
          PublishNuGet: ${{ variables.PublishNuGet }}

      # GitHub Release
      - template: .ci/az-publish-github.yml
        parameters:
          displayName: GitHub Release
          PublishGitHub: ${{ variables.PublishGitHub }}
