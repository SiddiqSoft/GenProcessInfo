# ============================================================================
# Azure Pipelines Main Configuration
# ============================================================================
#
# This pipeline:
# 1. Builds the library across multiple platforms with a build matrix
#    - Windows (x64, arm64) with MSVC
#    - Linux (x64) with Clang and GCC
# 2. Runs tests on all platforms (configurable)
# 3. Publishes to NuGet and GitHub (on main/master branches)
#
# Pipeline Stages:
# 1. Build - Unified build stage with matrix for all OS/Architecture/Compiler combinations
# 2. Publication - Publishes to NuGet and GitHub
#
# Documentation: See PIPELINE_DOCUMENTATION_INDEX.md for detailed information
# ============================================================================

# ============================================================================
# TRIGGER & PR CONFIGURATION
# ============================================================================
trigger:
  branches:
    include:
      - main
      - master
      - development
      - develop
      - release/*
  paths:
    exclude:
      - README.md
      - .ci/* # Skip CI when changing pipeline files
      - azure-pipelines.yml # Avoids recursive triggers when modifying the pipeline itself
pr:
  branches:
    include:
      - main
      - release/*

# ============================================================================
# RESOURCES
# ============================================================================
resources:
  repositories:
    - repository: self
      type: git

# ============================================================================
# PARAMETERS
# ============================================================================
parameters:
  - name: BuildOS
    type: object
    default: ['Windows', 'Linux', 'Darwin']
    displayName: "Build operating system"

  # Architecture Selection
  - name: BuildArchitectures
    type: object
    default: [ 'arm64', 'x64' ]
    displayName: "Build architectures"

  # Compiler Selection
  - name: CompilerSelection
    type: object
    default:
      Windows:
        MSVC
      Linux:
        Clang
        GCC
      Darwin:
        Clang

  # Testing
  - name: RunTests
    type: boolean
    default: true
    displayName: "Run tests after building"

  # Publishing
  - name: PublishNuGet
    type: boolean
    default: false
    displayName: "Publish to NuGet (auto-enabled on main/master)"

  - name: PublishGitHub
    type: boolean
    default: false
    displayName: "Create GitHub release (auto-enabled on main/master)"

  # Cleanup
  - name: Cleanup
    type: boolean
    default: false
    displayName: "Cleanup only (skip builds and tests)"

# ============================================================================
# VARIABLES
# ============================================================================
variables:
  # Auto-enable publishing on main/master branches
  ${{ if and(eq(parameters.PublishNuGet, false), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master'))) }}:
    PublishNuGet: true
    PublishGitHub: true
  ${{ else }}:
    PublishNuGet: ${{ parameters.PublishNuGet }}
    PublishGitHub: ${{ parameters.PublishGitHub }}

  # System information
  AgentOS: $(Agent.OS)
  AgentArch: $(Agent.OSArchitecture)

  # Build paths
  cpmCachePath: $(Agent.HomeDirectory)/.cpmcache
  buildOutputPath: $(System.DefaultWorkingDirectory)/build/$(cmake.preset)
  testResultsPath: $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests/results

# ============================================================================
# STAGES
# ============================================================================
stages:
- stage: Cleanup
  displayName: Cleanup
  dependsOn: []
  condition: eq(${{ parameters.Cleanup }}, true)
  jobs:
  - template: .ci/az-cleanup-${{ parameters.BuildOperatingSystem }}.yml
    parameters:
      displayName: "${{ parameters.BuildOperatingSystem }} Cleanup"
      BuildOperatingSystem: "${{ parameters.BuildOperatingSystem }}"
      CleanupDirectory: "$(cpmCachePath)"

  # ==========================================================================
  # STAGE 1: BUILD (Unified matrix for all platforms)
  # ==========================================================================
- ${{ each os in parameters.BuildOS }}
  - stage: Build_${{ os }}
    displayName: Build for ${{ os }}
    dependsOn: []
    condition: ne(${{ parameters.Cleanup }}, true)
    jobs:
    - job: BuildMatrix
      displayName: Build Matrix
      strategy:
        matrix:
          ${{ each arch in parameters.BuildArchitectures }}
             ${{ each compiler in parameters.CompilerSelection[os] }}
                ${{ os }}_${{ arch }}_${{ compiler }}:
                    OS: ${{ os }}
                    Architecture: ${{ arch }}
                    Compiler: ${{ compiler }}
        steps:
        - script: echo "Building on ${{ matrix.OS }} for ${{ matrix.Architecture }} with ${{ matrix.Compiler }}"
            displayName: "Build ${{ matrix.OS }} - ${{ matrix.Architecture }} - ${{ matrix.Compiler }}"
            # Here you would call your actual build scripts, e.g.:
            # - script: .ci/build.sh --os ${{ matrix.OS }} --arch ${{ matrix.Architecture }} --compiler ${{ matrix.Compiler }}
            #   displayName: "Run build script for ${{ matrix.OS }} - ${{ matrix.Architecture }} - ${{ matrix.Compiler }}"

  # ==========================================================================
  # STAGE 2: PUBLICATION
  # ==========================================================================
  - stage: Publication
    displayName: Publication
    dependsOn:
      - Build_Windows
      - Build_Linux
    condition: and(ne(${{ parameters.Cleanup }}, true), succeeded())
    jobs:
      # NuGet Release
      - template: .ci/az-publish-nuget.yml
        parameters:
          displayName: NuGet Release
          PublishNuGet: ${{ variables.PublishNuGet }}

      # GitHub Release
      - template: .ci/az-publish-github.yml
        parameters:
          displayName: GitHub Release
          PublishGitHub: ${{ variables.PublishGitHub }}
